      { districtName: "강남구", population: 562508, korean: 554165, foreigner: 8343, totalCCTV: 7530, history: { "2016이전": 1512, "2017": 412, "2018": 512, "2019": 612, "2020": 781, "2021": 512, "2022": 612, "2023": 812, "2024": 1512, "2025": 253 } },
      { districtName: "송파구", population: 649759, korean: 641892, foreigner: 7867, totalCCTV: 4250, history: { "2016이전": 812, "2017": 199, "2018": 281, "2019": 381, "2020": 451, "2021": 311, "2022": 399, "2023": 492, "2024": 812, "2025": 112 } },
      { districtName: "강동구", population: 503997, korean: 499100, foreigner: 4897, totalCCTV: 3820, history: { "2016이전": 712, "2017": 152, "2018": 221, "2019": 311, "2020": 411, "2021": 281, "2022": 351, "2023": 421, "2024": 841, "2025": 119 } }
    ];

    // CSV 파싱용 도우미 함수 (따옴표 내 쉼표 무시 및 공백 제거 완벽 대응)
    const parseCSVText = (text) => {
      if (!text || !text.trim()) return [];
      const lines = text.split(/\r?\n/);
      return lines.map(line => {
        if (!line.trim()) return null;
        const result = [];
        let current = '';
        let inQuotes = false;
        for (let i = 0; i < line.length; i++) {
          const char = line[i];
          if (char === '"') {
            inQuotes = !inQuotes;
          } else if (char === ',' && !inQuotes) {
            result.push(current.trim().replace(/^"|"$/g, ''));
            current = '';
          } else {
            current += char;
          }
        }
        result.push(current.trim().replace(/^"|"$/g, ''));
        return result;
      }).filter(Boolean);
    };

    // React ChartJS 래퍼 컴포넌트
    const InteractiveChart = ({ type, data, options, chartId }) => {
      const canvasRef = useRef(null);
      const chartInstanceRef = useRef(null);

      useEffect(() => {
        if (!canvasRef.current) return;

        if (chartInstanceRef.current) {
          chartInstanceRef.current.destroy();
        }

        const ctx = canvasRef.current.getContext('2d');
        chartInstanceRef.current = new window.Chart(ctx, {
          type,
          data,
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: {
                labels: { font: { family: 'Pretendard', size: 11 } }
              },
              tooltip: {
                titleFont: { family: 'Pretendard', size: 12, weight: 'bold' },
                bodyFont: { family: 'Pretendard', size: 12 }
              }
            },
            scales: {
              x: { grid: { display: false }, ticks: { font: { family: 'Pretendard', size: 10 } } },
              y: { grid: { color: '#f1f5f9' }, ticks: { font: { family: 'Pretendard', size: 10 } } }
            },
            ...options
          }
        });

        return () => {
          if (chartInstanceRef.current) {
            chartInstanceRef.current.destroy();
          }
        };
      }, [data, type, options]);

      return (
        <div className="relative w-full h-full">
          <canvas ref={canvasRef} id={chartId}></canvas>
        </div>
      );
    };

    function App() {
      // 대시보드 상태 관리
      const [rawCCTVData, setRawCCTVData] = useState(null);
      const [rawPopData, setRawPopData] = useState(null);
      const [activeDistrictName, setActiveDistrictName] = useState("종로구");
      const [searchTerm, setSearchTerm] = useState("");
      const [sortConfig, setSortConfig] = useState({ key: 'totalCCTV', direction: 'desc' });
      const [activeTab, setActiveTab] = useState("ratio"); // "ratio" | "popPerCctv"
      
      const [fileStatus, setFileStatus] = useState({
        cctv: { loaded: false, fileName: "", rowCount: 0 },
        pop: { loaded: false, fileName: "", rowCount: 0 }
      });

      // 2. CSV 파일 업로드 핸들러
      const handleFileUpload = (e, type) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
          const text = event.target.result;
          const parsed = parseCSVText(text);
          if (parsed.length <= 1) {
            alert(`${file.name} 파일을 정상적으로 해석하지 못했습니다. CSV 형식을 확인해주세요.`);
            return;
          }

          if (type === 'cctv') {
            setRawCCTVData(parsed);
            setFileStatus(prev => ({
              ...prev,
              cctv: { loaded: true, fileName: file.name, rowCount: parsed.length - 1 }
            }));
          } else {
            setRawPopData(parsed);
            setFileStatus(prev => ({
              ...prev,
              pop: { loaded: true, fileName: file.name, rowCount: parsed.length - 1 }
            }));
          }
        };
        reader.readAsText(file, "EUC-KR"); // 한국어 CSV 호환성(EUC-KR/UTF-8 대비)
      };

      // 3. CCTV & 인구 데이터 실시간 병합 및 연산
      const analyzedData = useMemo(() => {
        // CCTV 데이터 맵 구성
        const cctvMap = {};
        if (rawCCTVData) {
          // 업로드 데이터 처리
          // 헤더: 자치구,총 계,2016년 이전,2017...2025년
          const headers = rawCCTVData[0];
          for (let i = 1; i < rawCCTVData.length; i++) {
            const row = rawCCTVData[i];
            if (!row || row.length < 2) continue;
            const rawName = row[0];
            if (!rawName) continue;
            const normalizedName = rawName.replace(/\s+/g, ''); // "중 구" -> "중구"
            const totalCCTV = parseInt(row[1]?.replace(/,/g, '')) || 0;
            
            // 연도별 이력 매핑
            const history = {};
            for (let j = 2; j < Math.min(row.length, 12); j++) {
              const yearHeader = headers[j] ? headers[j].replace('년', '').trim() : `Col${j}`;
              history[yearHeader] = parseInt(row[j]?.replace(/,/g, '')) || 0;
            }

            cctvMap[normalizedName] = { totalCCTV, history };
          }
        } else {
          // 기본 프리셋 매핑
          DEFAULT_DATA.forEach(d => {
            cctvMap[d.districtName] = { totalCCTV: d.totalCCTV, history: d.history };
          });
        }

        // 인구 데이터 맵 구성 및 최종 병합
        const popList = [];
        if (rawPopData) {
          // 업로드 인구 데이터 처리 (서울특별시/자치구, 총인구, 내국인, 외국인)
          for (let i = 1; i < rawPopData.length; i++) {
            const row = rawPopData[i];
            if (!row || row.length < 2) continue;
            const rawName = row[0];
            if (!rawName || rawName === "합계" || rawName === "소계" || rawName.includes("서울")) continue;
            const normalizedName = rawName.replace(/\s+/g, '');
            const population = parseInt(row[1]?.replace(/,/g, '')) || 0;
            const korean = parseInt(row[2]?.replace(/,/g, '')) || 0;
            const foreigner = parseInt(row[3]?.replace(/,/g, '')) || 0;

            popList.push({
              districtName: normalizedName,
              population,
              korean,
              foreigner
            });
          }
        } else {
          // 기본 프리셋 매핑
          DEFAULT_DATA.forEach(d => {
            popList.push({
              districtName: d.districtName,
              population: d.population,
              korean: d.korean,
              foreigner: d.foreigner
            });
          });
        }

        // 서울시 전체 CCTV 총 수량 연산
        let totalCctvAllDistricts = 0;
        popList.forEach(item => {
          const cctvInfo = cctvMap[item.districtName] || { totalCCTV: 0, history: {} };
          totalCctvAllDistricts += cctvInfo.totalCCTV;
        });

        if (totalCctvAllDistricts === 0) {
          // 매핑 오류가 있을 수 있으므로 CCTV 맵의 총합 구하기
          totalCctvAllDistricts = Object.values(cctvMap).reduce((sum, current) => sum + current.totalCCTV, 0);
        }

        // 각 구별 최종 연산 지표 산출
        const mergedList = popList.map(popItem => {
          const cctvInfo = cctvMap[popItem.districtName] || {
            totalCCTV: DEFAULT_DATA.find(d => d.districtName === popItem.districtName)?.totalCCTV || 0,
            history: DEFAULT_DATA.find(d => d.districtName === popItem.districtName)?.history || {}
          };
          
          const installRatio = totalCctvAllDistricts > 0 
            ? (cctvInfo.totalCCTV / totalCctvAllDistricts) * 100 
            : 0;

          const popPerCCTV = cctvInfo.totalCCTV > 0 
            ? Math.round(popItem.population / cctvInfo.totalCCTV) 
            : 0;

          return {
            ...popItem,
            totalCCTV: cctvInfo.totalCCTV,
            history: cctvInfo.history,
            installRatio,
            popPerCCTV
          };
        }).filter(d => d.districtName && d.districtName !== "undefined");

        return {
          list: mergedList,
          totalCCTVAll: totalCctvAllDistricts,
          totalPopAll: mergedList.reduce((sum, d) => sum + d.population, 0),
          avgPopPerCCTVAll: totalCctvAllDistricts > 0 
            ? Math.round(mergedList.reduce((sum, d) => sum + d.population, 0) / totalCctvAllDistricts) 
            : 0
        };
      }, [rawCCTVData, rawPopData]);

      // 4. 활성화된 자치구 데이터 찾기
      const activeDistrict = useMemo(() => {
        const found = analyzedData.list.find(d => d.districtName === activeDistrictName);
        if (found) return found;
        if (analyzedData.list.length > 0) return analyzedData.list[0];
        return null;
      }, [analyzedData, activeDistrictName]);

      // 5. 검색 및 정렬이 적용된 자치구 목록
      const processedList = useMemo(() => {
        let result = [...analyzedData.list];
        
        // 검색 필터 적용
        if (searchTerm.trim() !== "") {
          result = result.filter(d => d.districtName.includes(searchTerm.trim()));
        }

        // 정렬 적용
        if (sortConfig.key) {
          result.sort((a, b) => {
            let aVal = a[sortConfig.key];
            let bVal = b[sortConfig.key];
            if (typeof aVal === 'string') {
              return sortConfig.direction === 'asc' 
                ? aVal.localeCompare(bVal) 
                : bVal.localeCompare(aVal);
            }
            return sortConfig.direction === 'asc' ? aVal - bVal : bVal - aVal;
          });
        }
        return result;
      }, [analyzedData, searchTerm, sortConfig]);

      // 6. 랭킹 산출 (CCTV 개수 기준, CCTV 1대당 인구수 기준 등)
      const rankData = useMemo(() => {
        const listByCCTV = [...analyzedData.list].sort((a, b) => b.totalCCTV - a.totalCCTV);
        const listByPopPerCCTV = [...analyzedData.list].sort((a, b) => a.popPerCCTV - b.popPerCCTV); // 인구당 CCTV가 많을수록 (값은 작을수록) 안전 순위 우위

        return {
          cctvRank: (name) => listByCCTV.findIndex(d => d.districtName === name) + 1,
          popPerCctvRank: (name) => listByPopPerCCTV.findIndex(d => d.districtName === name) + 1,
          maxCctvDistrict: listByCCTV[0],
          minPopPerCctvDistrict: listByPopPerCCTV[0] // 가장 촘촘하게 설치된 자치구 (1대당 인구수가 가장 적음)
        };
      }, [analyzedData]);

      // 7. 대시보드 리셋 (기본 데이터 환원)
      const handleResetData = () => {
        setRawCCTVData(null);
        setRawPopData(null);
        setFileStatus({
          cctv: { loaded: false, fileName: "", rowCount: 0 },
          pop: { loaded: false, fileName: "", rowCount: 0 }
        });
      };

      // 8. 정렬 트리거 함수
      const requestSort = (key) => {
        let direction = 'desc';
        if (sortConfig.key === key && sortConfig.direction === 'desc') {
          direction = 'asc';
        }
        setSortConfig({ key, direction });
      };

      // 9. 차트 데이터 객체 생성
      const chartDataSets = useMemo(() => {
        const labels = analyzedData.list.map(d => d.districtName);
        
        // 9-1. CCTV 설치 비율 차트 데이터
        const installRatioData = {
          labels,
          datasets: [{
            label: 'CCTV 설치 비율 (%)',
            data: analyzedData.list.map(d => d.installRatio),
            backgroundColor: labels.map(label => label === activeDistrictName ? '#3b82f6' : '#93c5fd'),
            borderColor: labels.map(label => label === activeDistrictName ? '#1d4ed8' : '#3b82f6'),
            borderWidth: 1.5,
            borderRadius: 4
          }]
        };

        // 9-2. CCTV 1대당 인구수 차트 데이터
        const popPerCCTVData = {
          labels,
          datasets: [{
            label: 'CCTV 1대당 인구수 (명)',
            data: analyzedData.list.map(d => d.popPerCCTV),
            backgroundColor: labels.map(label => label === activeDistrictName ? '#10b981' : '#a7f3d0'),
            borderColor: labels.map(label => label === activeDistrictName ? '#047857' : '#10b981'),
            borderWidth: 1.5,
            borderRadius: 4
          }]
        };

        // 9-3. 선택 구 연도별 설치 이력 차트 데이터
        let historyLabels = [];
        let historyValues = [];
        let cumulativeValues = [];
        
        if (activeDistrict && activeDistrict.history) {
          // 연도 키 정렬 (2016이전 -> 2017 -> 2018 ...)
          const keys = Object.keys(activeDistrict.history).sort((a, b) => {
            if (a.includes('이전')) return -1;
            if (b.includes('이전')) return 1;
            return parseInt(a) - parseInt(b);
          });
          
          historyLabels = keys.map(k => k.includes('이전') ? k : `${k}년`);
          historyValues = keys.map(k => activeDistrict.history[k]);

                <button
                  onClick={() => setActiveTab("ratio")}
                  className={`px-4 py-2 rounded-lg text-xs font-bold transition duration-150 ${activeTab === 'ratio' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-500 hover:text-slate-800'}`}
                >
                  CCTV 설치 비율 비교 (%)
                </button>
                <button
                  onClick={() => setActiveTab("popPerCctv")}
                  className={`px-4 py-2 rounded-lg text-xs font-bold transition duration-150 ${activeTab === 'popPerCctv' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-500 hover:text-slate-800'}`}
                >
                  CCTV 1대당 인구수 비교 (명)
                </button>
              </div>
            </div>

            {/* 차트 출력 영역 */}
            <div className="h-[360px] w-full">
              {activeTab === "ratio" ? (
                <InteractiveChart 
                  type="bar" 
                  chartId="allRatioChart"
                  data={chartDataSets.installRatioData} 
                  options={{
                    plugins: {
                      title: { display: true, text: '25개 자치구별 CCTV 배포 점유 비율 (%)', font: { family: 'Pretendard', size: 13, weight: 'bold' } }
                    }
                  }}
                />
              ) : (
                <InteractiveChart 
                  type="bar" 
                  chartId="allPopChart"
                  data={chartDataSets.popPerCCTVData} 
                  options={{
                    plugins: {
                      title: { display: true, text: 'CCTV 1대당 관할 인구 비교 (값이 작을수록 촘촘한 밀도 보유)', font: { family: 'Pretendard', size: 13, weight: 'bold' } }
                    }
                  }}
                />
              )}
            </div>
            
            <div className="text-center text-[11px] text-slate-400 mt-3">
              * 그래프의 파란색/초록색으로 활성화된 바는 현재 상세 브리핑 카드에서 선택된 <strong>{activeDistrictName}</strong>를 의미합니다.
            </div>
          </section>

          {/* 종합 정렬형 데이터 테이블 */}
          <section className="bg-white rounded-3xl p-6 shadow-sm border border-slate-200 overflow-hidden">
            <div className="flex flex-wrap items-center justify-between gap-4 mb-6">
              <div>
                <h2 className="text-lg font-bold text-slate-900 flex items-center gap-1.5">
                  <svg className="w-5 h-5 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 10h16M4 14h16M4 18h16" />
                  </svg>
                  전체 자치구 연산 데이터 상세 시트
                </h2>
                <p className="text-xs text-slate-400 mt-1">각 열의 머리글을 클릭하면 해당 열 기준으로 오름차순/내림차순 정렬됩니다.</p>
              </div>

              {/* 테이블 검색 필터 */}
              <div className="relative w-full sm:w-72">
                <input 
                  type="text"
                  placeholder="자치구 검색 (예: 종로구)..."
                  value={searchTerm}
                  onChange={(e) => setSearchTerm(e.target.value)}
                  className="w-full bg-slate-50 border border-slate-200 rounded-xl pl-9 pr-4 py-2.5 text-xs text-slate-800 placeholder-slate-400 focus:ring-2 focus:ring-indigo-500 focus:outline-none"
                />
                <span className="absolute left-3 top-3.5 text-slate-400">
                  <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                  </svg>
                </span>
              </div>
            </div>

            {/* 테이블 뷰 포트 */}
            <div className="overflow-x-auto rounded-xl border border-slate-100">
              <table className="w-full text-left text-xs text-slate-700">
                <thead className="bg-slate-50 border-b border-slate-200 text-slate-600 uppercase font-bold">
                  <tr>
                    <th onClick={() => requestSort('districtName')} className="px-5 py-4 cursor-pointer hover:bg-slate-100 transition select-none">
                      자치구 {sortConfig.key === 'districtName' ? (sortConfig.direction === 'asc' ? '▲' : '▼') : ''}
                    </th>
                    <th onClick={() => requestSort('population')} className="px-5 py-4 cursor-pointer hover:bg-slate-100 transition text-right select-none">
                      총 인구수 (명) {sortConfig.key === 'population' ? (sortConfig.direction === 'asc' ? '▲' : '▼') : ''}
                    </th>
                    <th onClick={() => requestSort('korean')} className="px-5 py-4 cursor-pointer hover:bg-slate-100 transition text-right select-none">
                      내국인 {sortConfig.key === 'korean' ? (sortConfig.direction === 'asc' ? '▲' : '▼') : ''}
                    </th>
                    <th onClick={() => requestSort('foreigner')} className="px-5 py-4 cursor-pointer hover:bg-slate-100 transition text-right select-none">
                      외국인 {sortConfig.key === 'foreigner' ? (sortConfig.direction === 'asc' ? '▲' : '▼') : ''}
                    </th>
                    <th onClick={() => requestSort('totalCCTV')} className="px-5 py-4 cursor-pointer hover:bg-slate-100 transition text-right select-none text-indigo-600">
                      CCTV 대수 (대) {sortConfig.key === 'totalCCTV' ? (sortConfig.direction === 'asc' ? '▲' : '▼') : ''}
                    </th>
                    <th onClick={() => requestSort('installRatio')} className="px-5 py-4 cursor-pointer hover:bg-slate-100 transition text-right select-none text-violet-600">
                      설치 비율 (%) {sortConfig.key === 'installRatio' ? (sortConfig.direction === 'asc' ? '▲' : '▼') : ''}
                    </th>
                    <th onClick={() => requestSort('popPerCCTV')} className="px-5 py-4 cursor-pointer hover:bg-slate-100 transition text-right select-none text-emerald-600">
                      1대당 인구수 (명) {sortConfig.key === 'popPerCCTV' ? (sortConfig.direction === 'asc' ? '▲' : '▼') : ''}
                    </th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-slate-100">
                  {processedList.length > 0 ? (
                    processedList.map((d) => (
                      <tr 
                        key={d.districtName}
                        onClick={() => setActiveDistrictName(d.districtName)}
                        className={`hover:bg-indigo-50/40 cursor-pointer transition ${d.districtName === activeDistrictName ? 'bg-indigo-50/60 font-medium' : ''}`}
                      >
                        <td className="px-5 py-3.5 flex items-center gap-2">
                          <span className={`w-1.5 h-1.5 rounded-full ${d.districtName === activeDistrictName ? 'bg-indigo-600' : 'bg-transparent'}`}></span>
                          {d.districtName}
                        </td>
                        <td className="px-5 py-3.5 text-right">{d.population.toLocaleString()}</td>
                        <td className="px-5 py-3.5 text-right text-slate-500">{d.korean.toLocaleString()}</td>
                        <td className="px-5 py-3.5 text-right text-slate-500">{d.foreigner.toLocaleString()}</td>
                        <td className="px-5 py-3.5 text-right font-semibold text-slate-900">{d.totalCCTV.toLocaleString()}</td>
                        <td className="px-5 py-3.5 text-right font-bold text-violet-700">{d.installRatio.toFixed(2)}%</td>
                        <td className="px-5 py-3.5 text-right font-bold text-emerald-700">{d.popPerCCTV.toLocaleString()}명</td>
                      </tr>
                    ))
                  ) : (
                    <tr>
                      <td colSpan="7" className="px-5 py-8 text-center text-slate-400">
                        검색 조건에 부합하는 자치구가 존재하지 않습니다.
                      </td>
                    </tr>
                  )}
                </tbody>
              </table>
            </div>
          </section>
          
          {/* 하단 푸터 */}
          <footer className="mt-12 text-center text-xs text-slate-400 border-t border-slate-200 pt-6">
            <p>© 2026 서울특별시 자치구 CCTV 및 인구 통합 안전 분석기. All rights reserved.</p>
            <p className="mt-1">기본으로 내장된 데이터는 서울시 공식 통계 자료를 바탕으로 재가공된 리포트입니다.</p>
          </footer>
        </div>
      );
    }

    const rootElement = document.getElementById('root');
    const root = ReactDOM.createRoot(rootElement);
    root.render(<App />);
  </script>
</body>
</html>
